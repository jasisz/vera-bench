# threshold is a delta (not absolute floor) — "don't drop by more than 1%".
# The absolute floor is enforced by CI's --cov-fail-under=35.
coverage:
  status:
    project:
      python:
        target: auto
        threshold: 1.0%
        flags:
          - python
    patch:
      python:
        target: auto
        # Informational: many code paths need API keys or vera installed,
        # so strict patch coverage would block legitimate PRs.
        informational: true
        flags:
          - python

flags:
  python:
    paths:
      - vera_bench/
    carryforward: true
